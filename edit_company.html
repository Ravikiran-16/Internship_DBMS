{% extends "admin/layout.html" %}
{% block title %}Edit Company — PlacementHub Admin{% endblock %}
{% block content %}
<div class="page-header">
    <a href="/admin/companies" style="color:var(--text-muted);font-size:0.85rem;text-decoration:none;"><i class="bi bi-arrow-left me-1"></i>Back to Companies</a>
    <h2 class="mt-2">Edit Company</h2>
</div>
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card">
            <div class="card-header"><i class="bi bi-pencil me-2 text-accent"></i>Update Details</div>
            <div class="card-body" style="padding:32px;">
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-12"><label class="form-label">Company Name *</label>
                            <input type="text" class="form-control" name="name" value="{{ company.name }}" required></div>
                        <div class="col-md-6"><label class="form-label">Location</label>
                            <input type="text" class="form-control" name="location" value="{{ company.location or '' }}"></div>
                        <div class="col-md-6"><label class="form-label">Industry</label>
                            <select class="form-select" name="industry">
                                {% for ind in ['Technology','Finance','Healthcare','Manufacturing','Consulting','E-commerce','Telecom','Education','Other'] %}
                                <option value="{{ ind }}" {% if company.industry == ind %}selected{% endif %}>{{ ind }}</option>
                                {% endfor %}
                            </select></div>
                        <div class="col-md-6"><label class="form-label">Website</label>
                            <input type="text" class="form-control" name="website" value="{{ company.website or '' }}"></div>
                        <div class="col-md-6"><label class="form-label">HR Contact</label>
                            <input type="email" class="form-control" name="hr_contact" value="{{ company.hr_contact or '' }}"></div>
                        <div class="col-12 mt-3 d-flex gap-3">
                            <button type="submit" class="btn btn-primary"><i class="bi bi-check2 me-2"></i>Save Changes</button>
                            <a href="/admin/companies" class="btn btn-secondary">Cancel</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
